services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 43214321
      MYSQL_DATABASE: naengjang_goat_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p43214321"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # DB — mysql 서비스 이름으로 접근
      DB_URL: jdbc:mysql://mysql:3306/naengjang_goat_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: 43214321
      # Redis — redis 서비스 이름으로 접근
      REDIS_ADDRESS: redis://redis:6379
      # Spring Batch — MySQL 환경에서 메타 테이블 자동 생성
      SPRING_BATCH_JDBC_INITIALIZE_SCHEMA: always
      # 민감값 — 프로덕션에서 .env 또는 Secrets Manager로 교체 권장
      # JWT_SECRET: <prod-secret>
      # KAMIS_API_KEY: <prod-key>
      # NAVER_CLIENT_ID: <prod-id>
      # NAVER_CLIENT_SECRET: <prod-secret>
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql-data:
